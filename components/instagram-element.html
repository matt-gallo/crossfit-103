<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Element</title>
    <style>
        .instagram-container {
            position: relative;
            display: inline-block;
            cursor: pointer;
            margin: 0;
            vertical-align: top;
        }

        .instagram-icon {
            width: 40px;
            height: 40px;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .instagram-icon:hover {
            transform: scale(1.1);
        }

        .instagram-icon svg {
            width: 22px;
            height: 22px;
            fill: #ffffff;
        }

        .hover-text {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-family: Arial, sans-serif;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .hover-text::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-bottom: 5px solid #333;
        }

        .instagram-container:hover .hover-text {
            opacity: 1;
            visibility: visible;
            bottom: -40px;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            padding: 0;
            margin: 0;
            color: #ffffff;
        }

    </style>
</head>
<body>

    <div class="instagram-container" onclick="openInstagram()">

        <div class="hover-text">follow us</div>
    </div>

    <script>
        function openInstagram() {
            // Replace with your Instagram username
            const instagramUsername = 'yourusername';

            // Create Instagram URL
            const instagramUrl = `https://www.instagram.com/${instagramUsername}`;

            // Open Instagram profile in new tab
            window.open(instagramUrl, '_blank');
        }
    </script>
